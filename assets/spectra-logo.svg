<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="spectrumGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="#0F172A"/>
  
  <!-- Spectrum dots -->
  <circle cx="35" cy="45" r="10" fill="#3B82F6"/>
  <circle cx="60" cy="45" r="10" fill="#10B981"/>
  <circle cx="85" cy="45" r="10" fill="#8B5CF6"/>
  
  <!-- Connecting arc -->
  <path d="M 35 60 Q 60 85 85 60" stroke="url(#spectrumGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Small accent dots -->
  <circle cx="35" cy="60" r="3" fill="#3B82F6"/>
  <circle cx="60" cy="75" r="3" fill="#10B981"/>
  <circle cx="85" cy="60" r="3" fill="#8B5CF6"/>
</svg>
