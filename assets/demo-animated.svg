<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes check {
      from { stroke-dashoffset: 20; }
      to { stroke-dashoffset: 0; }
    }
    .bg { fill: #0F172A; }
    .title { fill: #06B6D4; font-family: monospace; font-size: 24px; font-weight: bold; }
    .subtitle { fill: #94A3B8; font-family: monospace; font-size: 14px; }
    .phase-title { fill: #F8FAFC; font-family: monospace; font-size: 16px; font-weight: bold; }
    .step { fill: #10B981; font-family: monospace; font-size: 12px; }
    .command { fill: #E2E8F0; font-family: monospace; font-size: 11px; }
    .dot-blue { fill: #3B82F6; }
    .dot-green { fill: #10B981; }
    .dot-violet { fill: #8B5CF6; }
    
    .logo { animation: pulse 2s infinite; }
    .phase1 { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
    .phase2 { animation: fadeIn 0.5s ease-out 3s forwards; opacity: 0; }
    .phase3 { animation: fadeIn 0.5s ease-out 5s forwards; opacity: 0; }
    .complete { animation: fadeIn 0.5s ease-out 7s forwards; opacity: 0; }
    
    .step1 { animation: slideIn 0.3s ease-out 1.5s forwards; opacity: 0; }
    .step2 { animation: slideIn 0.3s ease-out 1.8s forwards; opacity: 0; }
    .step3 { animation: slideIn 0.3s ease-out 2.1s forwards; opacity: 0; }
    .step4 { animation: slideIn 0.3s ease-out 3.5s forwards; opacity: 0; }
    .step5 { animation: slideIn 0.3s ease-out 3.8s forwards; opacity: 0; }
    .step6 { animation: slideIn 0.3s ease-out 5.5s forwards; opacity: 0; }
    .step7 { animation: slideIn 0.3s ease-out 5.8s forwards; opacity: 0; }
    .step8 { animation: slideIn 0.3s ease-out 6.1s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect class="bg" width="800" height="400" rx="8"/>
  
  <!-- Terminal header -->
  <rect x="0" y="0" width="800" height="30" fill="#1E293B" rx="8"/>
  <circle cx="20" cy="15" r="6" fill="#EF4444"/>
  <circle cx="40" cy="15" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="15" r="6" fill="#10B981"/>
  <text x="400" y="20" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="12">spectra — bash</text>
  
  <!-- Logo -->
  <g class="logo" transform="translate(30, 50)">
    <circle cx="0" cy="0" r="8" class="dot-blue"/>
    <circle cx="25" cy="0" r="8" class="dot-green"/>
    <circle cx="50" cy="0" r="8" class="dot-violet"/>
  </g>
  <text x="100" y="55" class="title">SPECTRA</text>
  <text x="30" y="75" class="subtitle">Full-spectrum test automation</text>
  
  <!-- Command -->
  <text x="30" y="100" class="command">$ npx spectra --url http://localhost:5173 --scope "task management"</text>
  
  <!-- Phase 1: Planner -->
  <g class="phase1">
    <circle cx="45" cy="130" r="10" class="dot-blue"/>
    <text x="65" y="135" class="phase-title">PLANNER</text>
  </g>
  <text x="50" y="155" class="step step1">✓ Navigated to application</text>
  <text x="50" y="175" class="step step2">✓ Discovered 5 elements</text>
  <text x="50" y="195" class="step step3">✓ Generated test-plan.md</text>
  
  <!-- Phase 2: Generator -->
  <g class="phase2">
    <circle cx="310" cy="130" r="10" class="dot-green"/>
    <text x="330" y="135" class="phase-title">GENERATOR</text>
  </g>
  <text x="315" y="155" class="step step4">✓ Created TasksPage.ts</text>
  <text x="315" y="175" class="step step5">✓ Created tasks.spec.ts</text>
  
  <!-- Phase 3: Healer -->
  <g class="phase3">
    <circle cx="560" cy="130" r="10" class="dot-violet"/>
    <text x="580" y="135" class="phase-title">HEALER</text>
  </g>
  <text x="565" y="155" class="step step6">✗ 1 test failed</text>
  <text x="565" y="175" class="step step7">→ Fixed selector</text>
  <text x="565" y="195" class="step step8">✓ All tests passed</text>
  
  <!-- Connecting arrows -->
  <path d="M 200 150 L 280 150" stroke="#3B82F6" stroke-width="2" fill="none" class="phase2" marker-end="url(#arrow)"/>
  <path d="M 470 150 L 540 150" stroke="#10B981" stroke-width="2" fill="none" class="phase3" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
    </marker>
  </defs>
  
  <!-- Complete -->
  <g class="complete">
    <rect x="30" y="230" width="740" height="150" fill="#1E293B" rx="8"/>
    <text x="60" y="260" class="title">✨ SPECTRUM COMPLETE</text>
    <text x="60" y="290" class="step">📄 Page Objects: 1</text>
    <text x="60" y="310" class="step">🧪 Test files: 1</text>
    <text x="60" y="330" class="step">✓ Passed: 4 tests</text>
    
    <text x="300" y="290" class="command">$ pnpm test</text>
    <text x="300" y="315" fill="#10B981" font-family="monospace" font-size="11">✓ tasks.spec.ts › should display task list</text>
    <text x="300" y="335" fill="#10B981" font-family="monospace" font-size="11">✓ tasks.spec.ts › should add new task</text>
    <text x="300" y="355" fill="#10B981" font-family="monospace" font-size="11">✓ tasks.spec.ts › should mark complete</text>
    <text x="300" y="375" fill="#10B981" font-family="monospace" font-size="11">✓ tasks.spec.ts › should delete task</text>
  </g>
</svg>
